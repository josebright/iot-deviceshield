name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs for the same PR/branch.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Minimum-privilege default. Individual jobs opt into more when needed.
permissions:
  contents: read

env:
  # Silence Turbo telemetry in CI.
  TURBO_TELEMETRY_DISABLED: 1
  NEXT_TELEMETRY_DISABLED: 1

jobs:
  # ---------------------------------------------------------------------------
  # Fast feedback: lint, typecheck, unit tests, format.
  # Fans out via Turbo. If any of these fail, the rest of the pipeline is moot.
  # ---------------------------------------------------------------------------
  quality:
    name: Lint / Typecheck / Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      # No `with.version` — pnpm/action-setup reads it from package.json#packageManager.
      # Specifying both is a hard error since action-setup v4.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Format check
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test

  # ---------------------------------------------------------------------------
  # Supply-chain: block PRs that add high/critical CVEs.
  #
  # We use Google's OSV-Scanner rather than `pnpm audit` because npm retired
  # the audit endpoint pnpm hits (all pnpm versions currently 410). OSV-Scanner
  # reads pnpm-lock.yaml directly and queries the OSV database (which aggregates
  # GHSA + npm-advisories + others), so it's more comprehensive anyway.
  # ---------------------------------------------------------------------------
  audit:
    name: OSV-Scanner (supply chain)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
      # Install the CLI directly — the action wrapper misparses multi-line
      # scan-args and does not always write the SARIF on non-zero exit.
      - name: Install OSV-Scanner
        run: |
          OSV_VERSION=1.9.2
          curl -sSfL -o /tmp/osv-scanner \
            "https://github.com/google/osv-scanner/releases/download/v${OSV_VERSION}/osv-scanner_linux_amd64"
          chmod +x /tmp/osv-scanner
          sudo mv /tmp/osv-scanner /usr/local/bin/osv-scanner
          osv-scanner --version
      - name: Run OSV-Scanner (SARIF)
        id: osv
        # Exit non-zero when findings exist so the job fails, but produce the SARIF
        # first so the Security tab shows what to fix.
        run: |
          set +e
          osv-scanner scan source \
            --lockfile=pnpm-lock.yaml \
            --format=sarif \
            --output=osv-results.sarif
          scan_exit=$?
          echo "OSV exit code: $scan_exit"
          echo "scan_exit=$scan_exit" >> "$GITHUB_OUTPUT"
          # Always exit 0 in this step — the CI-gate job below decides pass/fail
          # after SARIF is uploaded.
          exit 0
      - name: Upload OSV SARIF
        if: always() && hashFiles('osv-results.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: osv-results.sarif
          category: osv-scanner
      - name: Fail on findings
        if: steps.osv.outputs.scan_exit != '0'
        run: |
          echo "OSV-Scanner reported vulnerabilities — see the Security tab (category: osv-scanner)."
          exit 1

  # ---------------------------------------------------------------------------
  # SAST via Semgrep (OWASP Top 10 + framework rulesets).
  # Uploads SARIF to the GitHub Security tab.
  # ---------------------------------------------------------------------------
  semgrep:
    name: Semgrep SAST
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      security-events: write
    container:
      image: semgrep/semgrep:latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Semgrep
        # We invoke the CLI directly rather than an action so the pipeline
        # doesn't break the next time Semgrep rebrands their action org.
        # `--error` bubbles findings up as a non-zero exit; SARIF still writes.
        run: |
          semgrep \
            --config=p/typescript \
            --config=p/nodejs \
            --config=p/nestjs \
            --config=p/nextjs \
            --config=p/owasp-top-ten \
            --config=p/dockerfile \
            --config=p/secrets \
            --sarif --output=semgrep.sarif \
            --error \
            . || echo "Semgrep found issues (SARIF uploaded)"
      - uses: github/codeql-action/upload-sarif@v3
        if: always() && hashFiles('semgrep.sarif') != ''
        with:
          sarif_file: semgrep.sarif
          category: semgrep

  # ---------------------------------------------------------------------------
  # Secret scanning on every push. Runs on full history for pushes to main,
  # and on the PR diff for pull requests.
  # ---------------------------------------------------------------------------
  gitleaks:
    name: Gitleaks secret scan
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml

  # ---------------------------------------------------------------------------
  # CodeQL — GitHub-native SAST, deep semantic queries for TS/JS.
  # ---------------------------------------------------------------------------
  codeql:
    name: CodeQL
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript]
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality
      - uses: github/codeql-action/analyze@v3

  # ---------------------------------------------------------------------------
  # Build container images, then Trivy-scan them for OS + language CVEs.
  # Fails the build on HIGH or CRITICAL findings.
  # ---------------------------------------------------------------------------
  containers:
    name: Build & Trivy scan (${{ matrix.app }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [quality]
    permissions:
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        app: [api, web]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/${{ matrix.app }}/Dockerfile
          push: false
          load: true
          tags: iot-deviceshield/${{ matrix.app }}:ci
          cache-from: type=gha,scope=${{ matrix.app }}
          cache-to: type=gha,mode=max,scope=${{ matrix.app }}

      - name: Trivy scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: iot-deviceshield/${{ matrix.app }}:ci
          format: sarif
          output: trivy-${{ matrix.app }}.sarif
          severity: HIGH,CRITICAL
          exit-code: '1'
          ignore-unfixed: true

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-${{ matrix.app }}.sarif
          category: trivy-${{ matrix.app }}

  # ---------------------------------------------------------------------------
  # Convenience gate — one status check to require in branch protection.
  # ---------------------------------------------------------------------------
  ci-gate:
    name: CI gate
    runs-on: ubuntu-latest
    needs: [quality, audit, semgrep, gitleaks, codeql, containers]
    if: always()
    steps:
      - name: Verify all required jobs passed
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "One or more required jobs failed or were cancelled."
            exit 1
          fi
          echo "All required jobs succeeded."
