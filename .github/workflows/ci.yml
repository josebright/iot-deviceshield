name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  TURBO_TELEMETRY_DISABLED: 1
  NEXT_TELEMETRY_DISABLED: 1

jobs:
  quality:
    name: Lint / Typecheck / Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Format check
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test

  audit:
    name: OSV-Scanner (supply chain)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v7
      - name: Install OSV-Scanner
        run: |
          OSV_VERSION=1.9.2
          curl -sSfL -o /tmp/osv-scanner \
            "https://github.com/google/osv-scanner/releases/download/v${OSV_VERSION}/osv-scanner_linux_amd64"
          chmod +x /tmp/osv-scanner
          sudo mv /tmp/osv-scanner /usr/local/bin/osv-scanner
          osv-scanner --version
      - name: Run OSV-Scanner (SARIF)
        id: osv
        run: |
          set +e
          osv-scanner \
            --lockfile=pnpm-lock.yaml \
            --format=sarif \
            --output=osv-results.sarif
          scan_exit=$?
          echo "OSV exit code: $scan_exit"
          echo "scan_exit=$scan_exit" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Upload OSV SARIF
        if: always() && hashFiles('osv-results.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: osv-results.sarif
          category: osv-scanner
      - name: Fail on findings
        if: steps.osv.outputs.scan_exit != '0'
        run: |
          echo "OSV-Scanner reported vulnerabilities — see the Security tab (category: osv-scanner)."
          exit 1

  semgrep:
    name: Semgrep SAST
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      security-events: write
    container:
      image: semgrep/semgrep:latest
    steps:
      - uses: actions/checkout@v7
      - name: Run Semgrep
        run: |
          semgrep \
            --config=p/typescript \
            --config=p/nodejs \
            --config=p/nestjs \
            --config=p/nextjs \
            --config=p/owasp-top-ten \
            --config=p/dockerfile \
            --config=p/secrets \
            --sarif --output=semgrep.sarif \
            --error \
            . || echo "Semgrep found issues (SARIF uploaded)"
      - uses: github/codeql-action/upload-sarif@v4
        if: always() && hashFiles('semgrep.sarif') != ''
        with:
          sarif_file: semgrep.sarif
          category: semgrep

  gitleaks:
    name: Gitleaks secret scan
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml

  codeql:
    name: CodeQL
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript]
    steps:
      - uses: actions/checkout@v7
      - uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality
      - uses: github/codeql-action/analyze@v4

  containers:
    name: Build & Trivy scan (${{ matrix.app }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [quality]
    permissions:
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        app: [api, web]
    steps:
      - uses: actions/checkout@v7

      - uses: docker/setup-buildx-action@v4

      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: apps/${{ matrix.app }}/Dockerfile
          push: false
          load: true
          tags: iot-deviceshield/${{ matrix.app }}:ci
          cache-from: type=gha,scope=${{ matrix.app }}
          cache-to: type=gha,mode=max,scope=${{ matrix.app }}

      - name: Trivy scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: iot-deviceshield/${{ matrix.app }}:ci
          format: sarif
          output: trivy-${{ matrix.app }}.sarif
          severity: HIGH,CRITICAL
          exit-code: '1'
          ignore-unfixed: true

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-${{ matrix.app }}.sarif
          category: trivy-${{ matrix.app }}

  ci-gate:
    name: CI gate
    runs-on: ubuntu-latest
    needs: [quality, audit, semgrep, gitleaks, codeql, containers]
    if: always()
    steps:
      - name: Verify all required jobs passed
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "One or more required jobs failed or were cancelled."
            exit 1
          fi
          echo "All required jobs succeeded."
