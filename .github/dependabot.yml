version: 2

updates:
  - package-ecosystem: npm
    directory: '/'
    schedule:
      interval: weekly
      day: monday
      time: '06:00'
      timezone: Etc/UTC
    open-pull-requests-limit: 2
    versioning-strategy: increase-if-necessary
    groups:
      root-non-major:
        applies-to: version-updates
        update-types: [minor, patch]
        patterns: ['*']
    ignore:
      - dependency-name: '*'
        update-types: [version-update:semver-major]

  - package-ecosystem: npm
    directory: '/apps/api'
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 2
    versioning-strategy: increase-if-necessary
    groups:
      api-non-major:
        applies-to: version-updates
        update-types: [minor, patch]
        patterns: ['*']
    ignore:
      - dependency-name: '*'
        update-types: [version-update:semver-major]

  - package-ecosystem: npm
    directory: '/apps/web'
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 2
    versioning-strategy: increase-if-necessary
    groups:
      web-non-major:
        applies-to: version-updates
        update-types: [minor, patch]
        patterns: ['*']
    ignore:
      - dependency-name: '*'
        update-types: [version-update:semver-major]

  - package-ecosystem: npm
    directory: '/packages/types'
    schedule:
      interval: weekly
    open-pull-requests-limit: 1
    versioning-strategy: increase-if-necessary
    groups:
      types-non-major:
        applies-to: version-updates
        update-types: [minor, patch]
        patterns: ['*']
    ignore:
      - dependency-name: '*'
        update-types: [version-update:semver-major]

  - package-ecosystem: npm
    directory: '/packages/eslint-config'
    schedule:
      interval: weekly
    open-pull-requests-limit: 1
    versioning-strategy: increase-if-necessary
    groups:
      eslint-config-non-major:
        applies-to: version-updates
        update-types: [minor, patch]
        patterns: ['*']
    ignore:
      - dependency-name: '*'
        update-types: [version-update:semver-major]

  - package-ecosystem: github-actions
    directory: '/'
    schedule:
      interval: weekly
    open-pull-requests-limit: 1
    groups:
      actions:
        patterns: ['*']

  - package-ecosystem: docker
    directory: '/apps/api'
    schedule:
      interval: weekly
    open-pull-requests-limit: 1
    ignore:
      - dependency-name: 'node'
        update-types: [version-update:semver-major]

  - package-ecosystem: docker
    directory: '/apps/web'
    schedule:
      interval: weekly
    open-pull-requests-limit: 1
    ignore:
      - dependency-name: 'node'
        update-types: [version-update:semver-major]
