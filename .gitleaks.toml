[extend]
useDefault = true

[[rules]]
id = "openai-api-key"
description = "OpenAI API key"
regex = '''sk-(proj-)?[A-Za-z0-9_-]{20,}'''
tags = ["openai", "key"]

  [rules.allowlist]
  description = "Known-safe placeholders in example env files and unit tests."
  regexes = [
    '''sk-your-key-here''',
    '''sk-test''',
    '''sk-\*+''',
  ]

[[rules]]
id = "jwt-secret-in-env"
description = "JWT secret set to a real value inside a committed env file"
regex = '''(?i)JWT_SECRET\s*=\s*[A-Za-z0-9/+=_-]{20,}'''
tags = ["jwt", "secret"]
path = '''\.env($|\..*)'''

  [rules.allowlist]
  description = "Placeholder prefixes in .env.example templates."
  regexes = [
    '''JWT_SECRET\s*=\s*replace-''',
    '''JWT_SECRET\s*=\s*change-''',
    '''JWT_SECRET\s*=\s*your-''',
    '''JWT_SECRET\s*=\s*example-''',
    '''JWT_SECRET\s*=\s*placeholder-''',
  ]

[allowlist]
description = "Repository-wide allowlist."
paths = [
  '''(^|/)\.env\.example$''',
  '''(^|/)README\.md$''',
  '''(^|/)docs/''',
  '''(^|/)pnpm-lock\.yaml$''',
  '''(^|/)\.gitleaks\.toml$''',
]
regexes = [
  '''DB_PASSWORD=change-me-in-real-env''',
]
