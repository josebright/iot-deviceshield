# Gitleaks configuration for iot-deviceshield.
# Extends the built-in ruleset (which covers AWS/GCP/Azure/Slack/GitHub/etc.)
# and adds project-specific rules and allowlists.

[extend]
useDefault = true

[[rules]]
id = "openai-api-key"
description = "OpenAI API key"
regex = '''sk-(proj-)?[A-Za-z0-9_-]{20,}'''
tags = ["openai", "key"]

[[rules]]
id = "jwt-secret-in-env"
description = "JWT secret set to a non-placeholder value inside a committed env file"
regex = '''(?i)JWT_SECRET\s*=\s*(?!replace-|change-|your-)([A-Za-z0-9/+=_-]{20,})'''
tags = ["jwt", "secret"]
path = '''\.env($|\.)'''

[allowlist]
description = "Global allowlist for known-safe fixtures and docs."
paths = [
  '''(^|/).env.example$''',
  '''(^|/)README\.md$''',
  '''(^|/)docs/''',
  '''(^|/)pnpm-lock\.yaml$''',
]
regexes = [
  # Well-known Postgres example creds only used in local dev / examples.
  '''DB_PASSWORD=change-me-in-real-env''',
  '''JWT_SECRET=replace-with-.*''',
  '''OPENAI_API_KEY=sk-your-key-here''',
]
