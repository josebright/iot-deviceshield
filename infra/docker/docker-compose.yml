# ============================================================================
# IoT-DeviceShield — local development stack
# Runs: postgres (data volume), api (NestJS), web (Next.js).
# Invoke via `pnpm docker:up` from the repo root.
# ============================================================================

name: iot-deviceshield

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USERNAME:-deviceshield}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      POSTGRES_DB: ${DB_NAME:-iot_deviceshield}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - '${DB_PORT:-5432}:5432'
    healthcheck:
      test:
        ['CMD-SHELL', 'pg_isready -U ${DB_USERNAME:-deviceshield} -d ${DB_NAME:-iot_deviceshield}']
      interval: 5s
      timeout: 5s
      retries: 10
    security_opt:
      - no-new-privileges:true

  api:
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
    image: iot-deviceshield/api:local
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      API_PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: ${DB_USERNAME:-deviceshield}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      DB_NAME: ${DB_NAME:-iot_deviceshield}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required (min 32 chars)}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-1h}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3001}
      OPENAI_API_KEY: ${OPENAI_API_KEY:?OPENAI_API_KEY is required}
      # Optional — when set, the API forwards 5xx errors to Sentry. Empty
      # by default so operators without a Sentry project can still boot.
      SENTRY_DSN: ${SENTRY_DSN:-}
      NVD_API_KEY: ${NVD_API_KEY:-}
    ports:
      - '3000:3000'
    security_opt:
      - no-new-privileges:true
    read_only: false
    cap_drop:
      - ALL

  web:
    build:
      context: ../..
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3000/v1}
    image: iot-deviceshield/web:local
    restart: unless-stopped
    depends_on:
      - api
    environment:
      NODE_ENV: production
      PORT: 3001
      HOSTNAME: 0.0.0.0
    ports:
      - '3001:3001'
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

volumes:
  postgres-data:
    driver: local
