name: iot-deviceshield

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USERNAME:-deviceshield}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      POSTGRES_DB: ${DB_NAME:-iot_deviceshield}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - '${DB_PORT:-5432}:5432'
    healthcheck:
      test:
        ['CMD-SHELL', 'pg_isready -U ${DB_USERNAME:-deviceshield} -d ${DB_NAME:-iot_deviceshield}']
      interval: 5s
      timeout: 5s
      retries: 10
    security_opt:
      - no-new-privileges:true

  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    environment:
      OLLAMA_HOST: 0.0.0.0
      OLLAMA_KEEP_ALIVE: 24h
    volumes:
      - ollama-models:/root/.ollama
    ports:
      - '${OLLAMA_PORT:-11434}:11434'
    healthcheck:
      test: ['CMD-SHELL', 'ollama list >/dev/null 2>&1 || exit 1']
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 20s
    security_opt:
      - no-new-privileges:true

  ollama-model-pull:
    image: ollama/ollama:latest
    restart: 'no'
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: http://ollama:11434
    entrypoint: ['/bin/sh', '-c']
    command:
      - |
        set -eu
        MODEL="$${OLLAMA_MODEL:-qwen2.5:3b}"
        if ollama list 2>/dev/null | awk 'NR>1 {print $$1}' | grep -qx "$$MODEL"; then
          echo "[model-pull] $$MODEL already present"
        else
          echo "[model-pull] pulling $$MODEL (first boot only; ~2.5 GB for qwen2.5:3b)"
          ollama pull "$$MODEL"
        fi

  api:
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
    image: iot-deviceshield/api:local
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_healthy
      ollama-model-pull:
        condition: service_completed_successfully
    environment:
      NODE_ENV: production
      API_PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: ${DB_USERNAME:-deviceshield}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      DB_NAME: ${DB_NAME:-iot_deviceshield}
      ADMIN_API_TOKEN: ${ADMIN_API_TOKEN:?ADMIN_API_TOKEN is required (min 32 chars, openssl rand -hex 32)}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3001}
      AI_ENABLED: ${AI_ENABLED:-true}
      OLLAMA_HOST: ${OLLAMA_HOST:-http://ollama:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5:3b}
      NVD_API_KEY: ${NVD_API_KEY:-}
      SENTRY_DSN: ${SENTRY_DSN:-}
      CLIENT_RATE_LIMIT_PER_MIN: ${CLIENT_RATE_LIMIT_PER_MIN:-60}
      CLIENT_VULN_RATE_LIMIT_PER_MIN: ${CLIENT_VULN_RATE_LIMIT_PER_MIN:-10}
      CVE_CACHE_MINUTES: ${CVE_CACHE_MINUTES:-30}
      CPE_RESOLVE_TTL_DAYS: ${CPE_RESOLVE_TTL_DAYS:-30}
      WARM_CACHE_ON_BOOT: ${WARM_CACHE_ON_BOOT:-true}
    ports:
      - '3000:3000'
    security_opt:
      - no-new-privileges:true
    read_only: false
    cap_drop:
      - ALL

  web:
    build:
      context: ../..
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3000/v1}
        NEXT_PUBLIC_SENTRY_DSN: ${NEXT_PUBLIC_SENTRY_DSN:-}
        SENTRY_AUTH_TOKEN: ${SENTRY_AUTH_TOKEN:-}
        SENTRY_ORG: ${SENTRY_ORG:-iot-deviceshield}
        SENTRY_PROJECT: ${SENTRY_PROJECT:-iot-deviceshield-frontend}
    image: iot-deviceshield/web:local
    restart: unless-stopped
    depends_on:
      - api
    environment:
      NODE_ENV: production
      PORT: 3001
      HOSTNAME: 0.0.0.0
      INTERNAL_API_URL: ${INTERNAL_API_URL:-http://api:3000/v1}
      SENTRY_DSN: ${NEXT_PUBLIC_SENTRY_DSN:-}
    ports:
      - '3001:3001'
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

volumes:
  postgres-data:
    driver: local
  ollama-models:
    driver: local
